#
# Configuration for wimpysworld/tailor
# Repository settings and metadata management

license: AGPL-3.0-or-later

repository:
  description: "Cloud Native GIS - Django platform for serving vector and raster geospatial layers as tiles"
  homepage: "https://kartoza.github.io/CloudNativeGIS/"
  has_wiki: false
  has_discussions: true
  has_projects: true
  has_issues: true
  allow_merge_commit: false
  allow_squash_merge: true
  allow_rebase_merge: true
  delete_branch_on_merge: true
  allow_auto_merge: true
  allow_update_branch: true
  squash_merge_commit_title: "PR_TITLE"
  squash_merge_commit_message: "COMMIT_MESSAGES"

  topics:
    - gis
    - geospatial
    - django
    - python
    - vector-tiles
    - pmtiles
    - cog
    - raster
    - mapbox
    - maputnik
    - kartoza
    - open-source

branch_protection:
  main:
    required_status_checks:
      strict: true
      contexts:
        - "Python Lint"
        - "Django App"
    enforce_admins: false
    required_pull_request_reviews:
      dismiss_stale_reviews: true
      require_code_owner_reviews: false
      required_approving_review_count: 1
    restrictions: null
    allow_force_pushes: false
    allow_deletions: false

labels:
  - name: "bug"
    color: "d73a4a"
    description: "Something isn't working"
  - name: "enhancement"
    color: "a2eeef"
    description: "New feature or request"
  - name: "documentation"
    color: "0075ca"
    description: "Improvements or additions to documentation"
  - name: "good first issue"
    color: "7057ff"
    description: "Good for newcomers"
  - name: "help wanted"
    color: "008672"
    description: "Extra attention is needed"
  - name: "question"
    color: "d876e3"
    description: "Further information is requested"
  - name: "wontfix"
    color: "ffffff"
    description: "This will not be worked on"
  - name: "duplicate"
    color: "cfd3d7"
    description: "This issue or pull request already exists"
  - name: "invalid"
    color: "e4e669"
    description: "This doesn't seem right"
  - name: "gis"
    color: "1d76db"
    description: "GIS/Geospatial related"
  - name: "api"
    color: "5319e7"
    description: "API related"
  - name: "frontend"
    color: "f9d0c4"
    description: "Frontend related"
  - name: "backend"
    color: "b60205"
    description: "Backend related"
  - name: "dependencies"
    color: "0366d6"
    description: "Pull requests that update a dependency file"
  - name: "security"
    color: "ee0701"
    description: "Security related"
