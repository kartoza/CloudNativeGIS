name: 📖 Documentation
on:
  push:
    branches:
      - main
      - docs
    # Paths can be used to only trigger actions when you have edited certain files, such as a file within the /docs directory
    paths:
      - ".github/workflows/BuildMKDocsAndPublishToGithubPages.yml"
      - "docs/**.md"
      - "docs/**.py"
      - "docs/assets/**"
  pull_request:
  # Allow manually running in the actions tab
  workflow_dispatch:

jobs:
  build:
    name: Deploy docs
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.head_ref == 'docs-fix'
    steps:
      - name: Checkout main from github
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
            pip install --upgrade pip
            pip install --no-cache-dir -r docs/requirements.txt

      - name: Verify installed packages
        run: |
          pip list | grep mkdocs || echo "MkDocs is NOT installed!"
          pip list | grep mkdocs-video || echo "mkdocs-video is NOT installed!"

      - name: Create MkDocs Config 🚀
        working-directory: ./docs
        run: ./create-mkdocs-html-config.sh

      - name: Build MkDocs Site (Explicit Config Path)
        run: mkdocs build --clean --config-file ./docs/mkdocs.yml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/site
