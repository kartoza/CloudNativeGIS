#
# pygeoapi configuration for CloudNativeGIS.
# Database credentials are read from the same environment variables as Django.
#
# After editing this file, regenerate the OpenAPI document:
#   pygeoapi openapi generate pygeoapi-config.yml > pygeoapi-openapi.yml

server:
  bind:
    host: 0.0.0.0
    port: 5000
  url: ${PYGEOAPI_SERVER_URL}
  mimetype: application/json; charset=UTF-8
  encoding: utf-8
  gzip: false
  languages:
    - en-US
  pretty_print: true
  limit: 10
  cors: true
  map:
    url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
    attribution: '<a href="https://osm.org/copyright">OpenStreetMap</a> contributors'

logging:
  level: ERROR

metadata:
  identification:
    title:
      en: CloudNativeGIS OGC API
    description:
      en: OGC API Features for CloudNativeGIS layers
    keywords:
      en:
        - geospatial
        - cloud
        - ogc
    keywords_type: theme
    terms_of_service: https://creativecommons.org/licenses/by/4.0/
    url: ${PYGEOAPI_SERVER_URL}
  license:
    name: CC-BY 4.0
    url: https://creativecommons.org/licenses/by/4.0/
  provider:
    name: Kartoza
    url: https://kartoza.com
  contact:
    name: Kartoza
    position: GIS Team
    email: info@kartoza.com
    url: https://kartoza.com

resources: {}
# Each layer in CloudNativeGIS has a dynamic table name:
#   schema: public_gis
#   table:  layer_<uuid_with_underscores>
#   geom column: geometry
#
# Example — add a layer resource here:
#
# my-layer:
#   type: collection
#   title:
#     en: My Layer
#   description:
#     en: Description of my layer
#   keywords:
#     en:
#       - layer
#   links: []
#   extents:
#     spatial:
#       bbox: [95.0, -11.0, 141.0, 6.0]
#       crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
#   providers:
#     - type: feature
#       name: PostgreSQL
#       data:
#         host: ${DATABASE_HOST}
#         port: 5432
#         dbname: ${DATABASE_NAME}
#         user: ${DATABASE_USERNAME}
#         password: ${DATABASE_PASSWORD}
#         search_path:
#           - public_gis
#       id_field: id
#       table: layer_<uuid_with_underscores>
#       geom_field: geometry